# Auto-generated by oxo-flow for workflow: comprehensive-test
FROM ubuntu:22.04

LABEL org.opencontainers.image.title="comprehensive-test"
LABEL org.opencontainers.image.version="1.0.0"

# System dependencies
RUN apt-get update && apt-get install -y \
    curl wget git build-essential \
    && rm -rf /var/lib/apt/lists/*

# Copy workflow
WORKDIR /workflow
COPY . /workflow/

# Run as non-root user
RUN groupadd -r oxoflow && useradd -r -g oxoflow -d /home/oxoflow -s /bin/bash oxoflow
USER oxoflow
WORKDIR /home/oxoflow

# Default entrypoint
ENTRYPOINT ["oxo-flow", "run"]

HEALTHCHECK CMD ["oxo-flow", "--version"]
