  <line x1="30" y1="70" x2="143" y2="70" stroke="#1e40af" stroke-width="6" stroke-linecap="round"/>

  <!-- Line 2 (Green): Branch -->
  <line x1="58" y1="100" x2="115" y2="100" stroke="#059669" stroke-width="5" stroke-linecap="round"/>

  <!-- Connections -->
  <line x1="58" y1="70" x2="58" y2="100" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
  <line x1="115" y1="70" x2="115" y2="100" stroke="#059669" stroke-width="5" stroke-linecap="round"/>

  <!-- Stations -->
  <circle cx="30" cy="70" r="8" fill="#f8fafc" stroke="#1a1a2e" stroke-width="3"/>
  <circle cx="58" cy="70" r="9" fill="#f8fafc" stroke="#1a1a2e" stroke-width="3"/>
  <circle cx="58" cy="100" r="7" fill="#f8fafc" stroke="#059669" stroke-width="2.5"/>
  <circle cx="86.6" cy="100" r="7" fill="#f8fafc" stroke="#059669" stroke-width="2.5"/>
  <circle cx="115" cy="100" r="7" fill="#f8fafc" stroke="#059669" stroke-width="2.5"/>
  <circle cx="115" cy="70" r="9" fill="#f8fafc" stroke="#1a1a2e" stroke-width="3"/>
  <circle cx="143" cy="70" r="8" fill="#f8fafc" stroke="#1a1a2e" stroke-width="3"/>

  <!-- Text -->
  <text x="86.6" y="138" text-anchor="middle"
