  - Home: index.md
  - Tutorials:
      - Installation: tutorials/installation.md
      - Quick Start: tutorials/quickstart.md
      - Your First Workflow: tutorials/first-workflow.md
      - Variant Calling Pipeline: tutorials/variant-calling.md
      - Environment Management: tutorials/environment-management.md
  - Workflow Gallery:
