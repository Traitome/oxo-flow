# Cross-compilation configuration for Linux targets.
# reqwest uses rustls (no OpenSSL dependency), so only basic
# cross-compilation toolchain setup is needed.

[target.aarch64-unknown-linux-musl]
pre-build = [
    "apt-get update",
    "DEBIAN_FRONTEND=noninteractive apt-get install -y -o Dpkg::Options::=\"--force-confdef\" -o Dpkg::Options::=\"--force-confnew\" musl-tools",
]

[target.armv7-unknown-linux-musleabihf]
pre-build = [
    "apt-get update",
    "DEBIAN_FRONTEND=noninteractive apt-get install -y -o Dpkg::Options::=\"--force-confdef\" -o Dpkg::Options::=\"--force-confnew\" musl-tools",
]

[target.x86_64-unknown-linux-musl]
pre-build = [
    "apt-get update",
    "DEBIAN_FRONTEND=noninteractive apt-get install -y -o Dpkg::Options::=\"--force-confdef\" -o Dpkg::Options::=\"--force-confnew\" musl-tools",
]
